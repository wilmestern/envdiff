[metadata]
name = envdiff
version = 0.1.0
description = Compare environment variable sets across staging and production configs with redaction support.
author = envdiff contributors
license = MIT
long_description = file: README.md
long_description_content_type = text/markdown
python_requires = >=3.8

[options]
packages = find:
include_package_data = True

[options.entry_points]
console_scripts =
    envdiff = envdiff.cli:main

[options.extras_require]
dev =
    pytest>=7.0
    pytest-cov

[tool:pytest]
testpaths = tests
addopts = --tb=short

[flake8]
max-line-length = 100
exclude =
    .git,
    __pycache__,
    *.egg-info
